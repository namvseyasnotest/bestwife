<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг лучших жён России</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid #ff4d6d; padding-bottom: 10px; }
        ol { list-style: none; padding: 0; }
        li { padding: 12px; margin: 8px 0; border-radius: 8px; background: #fff0f3; color: #555; font-weight: 500; }
        .winner { background: #ff4d6d; color: white; font-size: 1.2rem; font-weight: bold; transform: scale(1.05); box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3); }
        .other { opacity: 0.7; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Топ-10 лучших жён в России</h1>
        <ol>
            <li class="winner">1. Ледовских Анастасия Александровна</li>
            <li class="other">2. Больше никто</li>
            <li class="other">3. Больше никто</li>
            <li class="other">4. Больше никто</li>
            <li class="other">5. Больше никто</li>
            <li class="other">6. Больше никто</li>
            <li class="other">7. Больше никто</li>
            <li class="other">8. Больше никто</li>
            <li class="other">9. Больше никто</li>
            <li class="other">10. Больше никто</li>
        </ol>
    </div>
</body>
</html>
